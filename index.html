<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent Task Board Simulation Sandbox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="viewport-container">
    <!-- Left Control Panel[span_0](start_span)[span_0](end_span)[span_1](start_span)[span_1](end_span) -->
    <aside class="left-panel" aria-label="Simulation Controls">
      <div class="control-group">
        <button id="start-sim-btn" class="control-btn" type="button">Start Simulation</button>
        <button id="stop-sim-btn" class="control-btn" type="button">Stop Simulation</button>
      </div>
      <div class="action-group">
        <button id="add-task-btn" class="control-btn" type="button">Add Task</button>
        <div id="inline-input-container" class="inline-input-container hidden">
          <input id="task-title-input" type="text" placeholder="Enter task title..." aria-label="New task title">
        </div>
        <button id="inject-chaos-btn" class="control-btn" type="button">Inject Chaos</button>
        <button id="reset-system-btn" class="control-btn" type="button">Reset System</button>
      </div>
    </aside>

    <!-- Center Kanban Board Panel[span_2](start_span)[span_2](end_span)[span_3](start_span)[span_3](end_span) -->
    <main class="center-panel" aria-label="Kanban Board">
      <section class="kanban-column lane-backlog" aria-labelledby="backlog-heading">
        <header class="column-header">
          <h2 id="backlog-heading">Backlog</h2>
          <span id="backlog-count" class="column-counter">0</span>
        </header>
        <div id="lane-backlog-track" class="card-display-track"></div>
      </section>

      <section class="kanban-column lane-in-progress" aria-labelledby="in-progress-heading">
        <header class="column-header">
          <h2 id="in-progress-heading">In Progress</h2>
          <span id="in-progress-count" class="column-counter">0</span>
        </header>
        <div id="lane-in-progress-track" class="card-display-track"></div>
      </section>

      <section class="kanban-column lane-review" aria-labelledby="review-heading">
        <header class="column-header">
          <h2 id="review-heading">Review</h2>
          <span id="review-count" class="column-counter">0</span>
        </header>
        <div id="lane-review-track" class="card-display-track"></div>
      </section>

      <section class="kanban-column lane-done" aria-labelledby="done-heading">
        <header class="column-header">
          <h2 id="done-heading">Done</h2>
          <span id="done-count" class="column-counter">0</span>
        </header>
        <div id="lane-done-track" class="card-display-track"></div>
      </section>
    </main>

    <!-- Right Live Event Log Panel[span_4](start_span)[span_4](end_span)[span_5](start_span)[span_5](end_span) -->
    <aside class="right-panel" aria-label="System Telemetry Log">
      <div id="telemetry-log" class="telemetry-log-console" role="log" aria-live="polite"></div>
    </aside>
  </div>
  <script src="main.js"></script>
</body>
</html>
